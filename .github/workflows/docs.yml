name: Deploy Doxygen Docs

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Doxygen and Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz

      - name: Get version from git tag
        run: |
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//' || echo "0.0.0")
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Generate Doxyfile from template
        working-directory: dynamic-neural-field-composer
        run: sed "s/@DNF_COMPOSER_VERSION@/$VERSION/g" Doxyfile.in > Doxyfile

      - name: Generate documentation
        working-directory: dynamic-neural-field-composer
        run: doxygen Doxyfile

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dynamic-neural-field-composer/docs/html
