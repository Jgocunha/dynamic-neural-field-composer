name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      VCPKG_DEFAULT_TRIPLET: x64-linux
      IPK_INSTALL_PREFIX: ${{ github.workspace }}/imgui-platform-kit-install

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── System dependencies ────────────────────────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-13 g++-13 \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libglfw3-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libxext-dev
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-13 100
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-13 100

      # ── vcpkg ─────────────────────────────────────────────────────────────
      - name: Clone vcpkg
        run: git clone https://github.com/microsoft/vcpkg.git $VCPKG_ROOT

      - name: Bootstrap vcpkg
        run: $VCPKG_ROOT/bootstrap-vcpkg.sh -disableMetrics

      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_ROOT }}/installed
          key: vcpkg-${{ runner.os }}-${{ hashFiles('build.sh') }}
          restore-keys: vcpkg-${{ runner.os }}-

      - name: Install vcpkg packages
        run: |
          $VCPKG_ROOT/vcpkg install \
            "imgui[docking-experimental,core,opengl3-binding,glfw-binding]" \
            implot \
            imgui-node-editor \
            nlohmann-json \
            gtest

      # ── imgui-platform-kit (from source) ───────────────────────────────────
      - name: Clone imgui-platform-kit
        run: |
          git clone https://github.com/Jgocunha/imgui-platform-kit.git \
            ${{ github.workspace }}/imgui-platform-kit-src

      - name: Configure imgui-platform-kit
        run: |
          cmake -S ${{ github.workspace }}/imgui-platform-kit-src/imgui-platform-kit \
                -B ${{ github.workspace }}/imgui-platform-kit-src/build \
                -DCMAKE_TOOLCHAIN_FILE=$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_INSTALL_PREFIX=$IPK_INSTALL_PREFIX \
                -DCMAKE_CXX_COMPILER=g++-13 \
                -DCMAKE_C_COMPILER=gcc-13

      - name: Build imgui-platform-kit
        run: cmake --build ${{ github.workspace }}/imgui-platform-kit-src/build --parallel $(nproc)

      - name: Install imgui-platform-kit
        run: cmake --install ${{ github.workspace }}/imgui-platform-kit-src/build

      # ── Main project ───────────────────────────────────────────────────────
      - name: Configure CMake
        run: |
          cmake -S ./dynamic-neural-field-composer -B build \
                -DCMAKE_TOOLCHAIN_FILE=$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_PREFIX_PATH=$IPK_INSTALL_PREFIX \
                -DCMAKE_CXX_COMPILER=g++-13 \
                -DCMAKE_C_COMPILER=gcc-13

      - name: Build
        run: cmake --build build --parallel $(nproc)

      # ── Tests ──────────────────────────────────────────────────────────────
      - name: Run tests
        working-directory: build
        run: ctest --output-on-failure --parallel $(nproc)
