name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test-linux:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - build_type: Release
            coverage: false
          - build_type: Debug
            coverage: true

    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      VCPKG_DEFAULT_TRIPLET: x64-linux

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── System dependencies ────────────────────────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-13 g++-13 \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libglfw3-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libxext-dev \
            gcovr
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-13 100
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-13 100

      # ── vcpkg ─────────────────────────────────────────────────────────────
      - name: Clone vcpkg
        run: git clone https://github.com/microsoft/vcpkg.git $VCPKG_ROOT

      - name: Bootstrap vcpkg
        run: $VCPKG_ROOT/bootstrap-vcpkg.sh -disableMetrics

      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_ROOT }}/installed
          key: vcpkg-${{ runner.os }}-${{ hashFiles('dynamic-neural-field-composer/scripts/setup.sh') }}
          restore-keys: vcpkg-${{ runner.os }}-

      # ── Dependencies + build ───────────────────────────────────────────────
      - name: Setup dependencies
        working-directory: ./dynamic-neural-field-composer
        run: |
          chmod +x scripts/setup.sh
          ./scripts/setup.sh

      - name: Build
        if: ${{ !matrix.coverage }}
        working-directory: ./dynamic-neural-field-composer
        run: |
          chmod +x scripts/build.sh
          ./scripts/build.sh

      - name: Configure CMake (coverage)
        if: ${{ matrix.coverage }}
        working-directory: ./dynamic-neural-field-composer
        run: |
          cmake -S . -B build/linux-debug \
                -DCMAKE_TOOLCHAIN_FILE=$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake \
                -DCMAKE_BUILD_TYPE=Debug \
                -DCMAKE_PREFIX_PATH=$GITHUB_WORKSPACE/dynamic-neural-field-composer/deps/ipk-install \
                -DCMAKE_CXX_COMPILER=g++-13 \
                -DCMAKE_C_COMPILER=gcc-13 \
                -DCMAKE_CXX_FLAGS=--coverage \
                -DCMAKE_EXE_LINKER_FLAGS=--coverage

      - name: Build (coverage)
        if: ${{ matrix.coverage }}
        working-directory: ./dynamic-neural-field-composer
        run: cmake --build build/linux-debug --parallel $(nproc)

      # ── Tests ──────────────────────────────────────────────────────────────
      - name: Run tests
        if: ${{ !matrix.coverage }}
        working-directory: ./dynamic-neural-field-composer/build/linux-release
        run: ctest --output-on-failure --parallel $(nproc)

      - name: Run tests (coverage)
        if: ${{ matrix.coverage }}
        working-directory: ./dynamic-neural-field-composer/build/linux-debug
        run: ctest --output-on-failure --parallel $(nproc)

      # ── Coverage report (Debug matrix entry only) ──────────────────────────
      - name: Generate coverage report
        if: matrix.coverage && github.event_name == 'push'
        run: |
          gcovr \
            --root ${{ github.workspace }}/dynamic-neural-field-composer \
            --object-directory ${{ github.workspace }}/dynamic-neural-field-composer/build/linux-debug \
            --gcov-executable gcov-13 \
            --exclude '.*vcpkg.*' \
            --exclude '.*/tests/.*' \
            --exclude '.*/imgui-platform-kit.*' \
            --exclude-directories '.*CMakeFiles.*' \
            --gcov-ignore-errors=no_working_dir_found \
            --xml \
            -o coverage.xml

      - name: Upload coverage to Codecov
        if: matrix.coverage && github.event_name == 'push'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          flags: unittests
          fail_ci_if_error: false

  build-and-test-windows:
    runs-on: windows-latest

    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      VCPKG_DEFAULT_TRIPLET: x64-windows

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Normalize Windows paths for bash ──────────────────────────────────
      - name: Normalize paths
        run: |
          echo "VCPKG_ROOT=$(echo "$VCPKG_ROOT" | tr '\\' '/')" >> "$GITHUB_ENV"

      # ── vcpkg ─────────────────────────────────────────────────────────────
      - name: Clone vcpkg
        run: git clone https://github.com/microsoft/vcpkg.git $VCPKG_ROOT

      - name: Bootstrap vcpkg
        run: $VCPKG_ROOT/bootstrap-vcpkg.bat -disableMetrics

      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_ROOT }}/installed
          key: vcpkg-${{ runner.os }}-${{ hashFiles('dynamic-neural-field-composer/scripts/setup.bat') }}
          restore-keys: vcpkg-${{ runner.os }}-

      # ── Dependencies + build ───────────────────────────────────────────────
      - name: Setup dependencies
        working-directory: ./dynamic-neural-field-composer
        shell: cmd
        run: scripts\setup.bat

      - name: Build
        working-directory: ./dynamic-neural-field-composer
        shell: cmd
        run: scripts\build.bat

      # ── Tests ──────────────────────────────────────────────────────────────
      - name: Run tests
        working-directory: ./dynamic-neural-field-composer/build/x64-release
        run: ctest -C Release --output-on-failure --parallel

  build-and-test-macos:
    runs-on: macos-latest

    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Detect architecture and set vcpkg triplet ──────────────────────────
      - name: Set vcpkg triplet
        id: triplet
        run: |
          ARCH=$(uname -m)
          if [ "$ARCH" = "arm64" ]; then
            echo "VCPKG_DEFAULT_TRIPLET=arm64-osx" >> "$GITHUB_ENV"
            echo "vcpkg_triplet=arm64-osx" >> "$GITHUB_OUTPUT"
          else
            echo "VCPKG_DEFAULT_TRIPLET=x64-osx" >> "$GITHUB_ENV"
            echo "vcpkg_triplet=x64-osx" >> "$GITHUB_OUTPUT"
          fi

      # ── vcpkg ─────────────────────────────────────────────────────────────
      - name: Clone vcpkg
        run: git clone https://github.com/microsoft/vcpkg.git $VCPKG_ROOT

      - name: Bootstrap vcpkg
        run: $VCPKG_ROOT/bootstrap-vcpkg.sh -disableMetrics

      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_ROOT }}/installed
          key: vcpkg-${{ runner.os }}-${{ steps.triplet.outputs.vcpkg_triplet }}-${{ hashFiles('dynamic-neural-field-composer/scripts/setup.sh') }}
          restore-keys: vcpkg-${{ runner.os }}-${{ steps.triplet.outputs.vcpkg_triplet }}-

      # ── Dependencies + build ───────────────────────────────────────────────
      - name: Setup dependencies
        working-directory: ./dynamic-neural-field-composer
        run: |
          chmod +x scripts/setup.sh
          ./scripts/setup.sh

      - name: Build
        working-directory: ./dynamic-neural-field-composer
        run: |
          chmod +x scripts/build_macos.sh
          ./scripts/build_macos.sh

      # ── Tests ──────────────────────────────────────────────────────────────
      - name: Run tests
        working-directory: ./dynamic-neural-field-composer/build/macos-release
        run: ctest --output-on-failure --parallel $(sysctl -n hw.logicalcpu)
