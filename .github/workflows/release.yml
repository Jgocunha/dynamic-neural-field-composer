name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release-windows:
    runs-on: windows-latest

    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      VCPKG_DEFAULT_TRIPLET: x64-windows
      IPK_SRC: ${{ github.workspace }}/imgui-platform-kit-src
      IPK_INSTALL_PREFIX: ${{ github.workspace }}/imgui-platform-kit-install
      INSTALL_PREFIX: ${{ github.workspace }}/install

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── vcpkg ─────────────────────────────────────────────────────────────
      - name: Clone vcpkg
        run: git clone https://github.com/microsoft/vcpkg.git $VCPKG_ROOT

      - name: Bootstrap vcpkg
        run: $VCPKG_ROOT/bootstrap-vcpkg.bat -disableMetrics

      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_ROOT }}/installed
          key: vcpkg-${{ runner.os }}-${{ hashFiles('build.sh') }}
          restore-keys: vcpkg-${{ runner.os }}-

      - name: Install vcpkg packages
        run: |
          $VCPKG_ROOT/vcpkg install \
            "imgui[docking-experimental,core,opengl3-binding,glfw-binding]" \
            implot \
            imgui-node-editor \
            nlohmann-json \
            gtest

      # ── imgui-platform-kit (from source) ───────────────────────────────────
      - name: Clone imgui-platform-kit
        run: git clone https://github.com/Jgocunha/imgui-platform-kit.git $IPK_SRC

      - name: Configure imgui-platform-kit
        run: |
          cmake -S $IPK_SRC/imgui-platform-kit \
                -B $IPK_SRC/build \
                -DCMAKE_TOOLCHAIN_FILE=$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_INSTALL_PREFIX=$IPK_INSTALL_PREFIX

      - name: Build imgui-platform-kit
        run: cmake --build $IPK_SRC/build --config Release --parallel

      - name: Install imgui-platform-kit
        run: cmake --install $IPK_SRC/build --config Release

      # ── Main project ───────────────────────────────────────────────────────
      - name: Configure CMake
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)
          cmake -S ./dynamic-neural-field-composer -B build \
                -DCMAKE_TOOLCHAIN_FILE=$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_PREFIX_PATH=$IPK_INSTALL_PREFIX \
                -DCMAKE_INSTALL_PREFIX=$INSTALL_PREFIX \
                -DDNF_COMPOSER_VERSION_MAJOR=$MAJOR \
                -DDNF_COMPOSER_VERSION_MINOR=$MINOR \
                -DDNF_COMPOSER_VERSION_PATCH=$PATCH \
                -DDNF_COMPOSER_BUILD_TESTS=OFF

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Install
        run: cmake --install build --config Release

      # ── Package ────────────────────────────────────────────────────────────
      - name: Create release archive
        run: |
          cd $INSTALL_PREFIX
          7z a ${{ github.workspace }}/dynamic-neural-field-composer-${{ github.ref_name }}-windows-x64.zip .

      # ── GitHub Release ─────────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: dynamic-neural-field-composer-${{ github.ref_name }}-windows-x64.zip
